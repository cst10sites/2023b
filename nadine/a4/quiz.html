<h2>Quiz</h2>




	<!--Example 2-->
	<h3>Question 1</h3>
	<form>
	    <label>What does HTML stand for?</label><br>
	    <input type="radio" value="Hyperlinks and Text Markup Language" name="group">
	    <label>Hyperlinks and Text Markup Language</label><br>
	    <input id="correctLang" type="radio" value="Hypertext Markup Language" name="group">
	    <label>Hypertext Markup Language</label> <br>
	    <input type="radio" value="Home Tool Markup Language" name="group">
	    <label>Home Tool Markup Language</label>
	   
	    <br>
	    <input type="button" value="Submit" onclick="checkLang();"><br> 
		<input type="reset"><br> 
	</form>

	<!--Example 3-->
	<h3>Question 2</h3>
	<form>
	    <label>Inside which HTML element do we put the JavaScript?</label><br>
	    <input id="choice1" type="checkbox" value="&lt;script&gt;">
	    <label>&lt;script&gt;</label>
	    <input id="choice2" type="checkbox" value="&lt;js&gt;">
	    <label>&lt;js&gt;</label><br>
	    <input id="choice3" type="checkbox" value="&lt;javascript&gt;">
	    <label>&lt;javascript&gt;</label> 
	    <br>
	    <input type="button" value="Submit" onclick="script();"><br> 
		<input type="reset"><br> 
	</form>

	
<script>

function checkLang() {
	var correctAns = document.getElementById("correctLang").checked
	// .checked -> get T/F value for radio buttons 
	// alert(correctAns); // true or false

	if (correctAns == true) {
		alert("Correct!");

	} else {
		alert("Wrong! Try again.");
	}

} // end of Example 2

// Example 3 
function script() {
	var choice1 = document.getElementById("choice1").checked; // milk
	var choice2 = document.getElementById("choice2").checked; // juice
	var choice3 = document.getElementById("choice3").checked; // eggs

	if (choice1 == true && choice2 == false && choice3 == false) {
		alert("Correct!");
	} else {
		alert("Wrong! Try again.");
	}


}
    
    	

</script>

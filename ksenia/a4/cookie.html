<h1>Cookie Clicker</h1>
<img style = "width:200px;" onclick="updateCPS();" src = "https://purepng.com/public/uploads/large/purepng.com-cookiescookiessnacksbaked-snacksflour-cookieschocolate-cookies-1411527249039ulhcg.png" id = "cookie">
<p> Cookie Clicked: <span id= "counter">0</span> </p>
<p>Clicks per second: <p id="cpsDisplay"></p></p>
<button id ="reset" onclick = "reset()" > Reset </button>


<hr>
<h2>Quiz</h2>
<p>Click <a href="index.html">here</a> to play the quiz.</p>


<script>








// global variables
var Clicks = 0;
var startTime = new Date();
var timeElapsed;


function updateCPS() {
    if (Clicks == 0) {
        // first click
        // 1. reset startTime
        startTime = new Date();
        // 2. increase nClicks by 1
        Clicks = Clicks + 1;
    }
    else {
        // subsequent clicks:
        // 1. create variable currentTime
        var currentTime = new Date();
        // 2. create variable timeElapsed and subtract start and currentTime
        var timeElapsed = (currentTime - startTime) / 1000 // in seconds
        // 3. calculate CPS = nClicks ÷ timeElapsed
        var updateCPS = (Clicks / timeElapsed) / 1000
        //    BUT timeElapsed be measured in seconds (not milliseconds)
        // 4. display CPS using id
        counter.innerHTML = Clicks;
        document.getElementById('cpsDisplay').innerHTML = (Clicks / timeElapsed);
        // 5. increase nClicks by 1
        Clicks = Clicks + 1;

    }
}


function reset(){
	Clicks = 0;
	counter.innerHTML = Clicks;
}





</script>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Assignment 4</title>
	<style>
			body {
				background-image: url('https://i.pinimg.com/736x/fb/3c/f2/fb3cf2fcbc704f77fca8a909d47cf526.jpg');
			}
	</style>
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="icon" type="image/x-icon" href="cookie.ico">
	<!--create style.css and change to href="style.css"-->
</head>
<body>
	<div class="cookie">
		<h1>Cookie Clicker</h1>
		<p>Click <a href="quiz.html">here</a> to play the quiz.</p>
		<button style="border: none; background-color: rgba(0, 0, 0, 0);" onclick="updateCPS();"><img src="cookie2.png" alt="cookie"></button><br>
		<button onclick="reset();">Reset</button>
		<p id="cpsDisplay"></p>
		<p id="clickDisplay"></p>
		<p id="timeDisplay"></p>
	</div>

	<script>

		var nClicks = 0;
		var cps = 0;
		var startTime = new Date();

		function updateCPS() {
			if (nClicks == 0) {
				// first click
				// 1. reset startTime
				// 2. increase nClicks by 1
			startTime = new Date();
			}
				// subsequent clicks:
				// 1. create variable currentTime
				// 2. create variable timeElapsed and subtract start and currentTime
				// 3. calculate CPS = nClicks ÷ timeElapsed 
				//    BUT timeElapsed be measured in seconds (not milliseconds)
				// 4. display CPS using id
				// 5. increase nClicks by 1
				var currentTime = new Date();
				var timeElapsed = (currentTime - startTime) / 1000;
				var cps = (nClicks / timeElapsed);
				nClicks = nClicks + 1;
				document.getElementById("cpsDisplay").innerHTML = "Clicks/second: " + cps;
				document.getElementById("clickDisplay").innerHTML = "Clicks: " + nClicks;
				document.getElementById("timeDisplay").innerHTML = "Time: " + timeElapsed;
			if (cps == NaN) {
				document.getElementById("cpsDisplay").innerHTML = "Clicks/second: 0"
			}
			

		}

		function reset() {
			nClicks = 0;
			startTime = new Date();
			cps = 0;
			timeElapsed = 0;
			document.getElementById("cpsDisplay").innerHTML = ""
			document.getElementById("clickDisplay").innerHTML = ""
			document.getElementById("timeDisplay").innerHTML = ""
		}

	</script>
</body>
</html>

<body>
<h2>Cookie Clicker</h2>
<button onclick="updateCPS();"><img style= "width:500px ;" src="https://th.bing.com/th/id/OIP.RWDbrhKH5eG0RHFr9P_OuwHaHa?pid=ImgDet&w=500&h=500&rs=1"></button>
<br>
<button onclick="reset()";>Reset</button>
<br>
<p id="cpsDisplay"></p>
<p id="timeElapsed"></p>
<p id="click" style="color:red;"></p>


<hr>
<h2>HTML/CSS/JS Quiz</h2>
<p>Click <a href="quiz.html">here</a> to play the quiz.</p>

<script>
// global variables
var nClicks = 0;
var startTime = new Date();

function updateCPS() {
  if (nClicks == 0) {
    startTime = new Date();
    // first click
    // 1. reset startTime
    // 2. increase nClicks by 1
  }
  else {
    // subsequent clicks:
    // 1. create variable currentTime
    // 2. create variable timeElapsed and subtract start and currentTime
    // 3. calculate CPS = nClicks ÷ timeElapsed 
    //    BUT timeElapsed be measured in seconds (not milliseconds)
    // 4. display CPS using id
    // 5. increase nClicks by 1

      var currentTime = new Date();
      var timeElapsed = (currentTime - startTime) / 1000
      var cps = nClicks / timeElapsed


      document.getElementById('cpsDisplay').innerHTML = "<br>cps " + cps;


    }
      nClicks = nClicks + 1;
}
      function reset() {
          location.reload();
      }
      
</script>

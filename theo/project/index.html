<!DOCTYPE html>
<html lang="en">
<head >

	<meta charset="utf-8">
	<title>Frank Lloyd Wright</title>
<style>
		body{
			background-image: url('0.jpg');
			background-size: cover;
 
			text-align: center;
			color: whitesmoke;
			box-sizing: border-box;
			opacity: 0.1;
   transition: opacity .5s;
    transition: opacity .5s;
   background-color: grey;
   animation: fadeInAnimation ease 3s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;

        }

        @keyframes fadeInAnimation {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
           }
		
		}

		
		h1{
			padding-top: 100px;
			padding-left: 60px;
			font-size: 5em;
			color: red;
		}
		

		
		.greydiv{		
			position: absolute;
			

		}
			.block:hover {

	        transform: translate(10px, 10px);
	        transition: ease-in-out 0.4s;
	    }
	    .block{
	      transition: ease-in-out 0.4s;

	    }
	    .navbar{
			overflow: hidden;
			background-color: #333;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			display: inline-block;

		}
		.navbar a{
			float: left;
			display: block;
			color: whitesmoke;
			text-align: center;
			padding: 4px 16px;
			text-decoration: none;
			transition: ease-in-out 0.3s;
	
		

		}
		.navbar a:hover{

			background-color : grey;
			transition:  ease-in-out 0.3s;

		}
		.navbar p{
			text-align: center;
		}
		
		.aspecial{
			display: block;
			color: whitesmoke;
			text-align: center;
			padding: 4px 16px;
			text-decoration: none;
						transition: ease-in-out 1s;

		}
		.aspecial:hover{
			color: #333;
			transition: ease-in-out 1s;
		}

	

		.block{
			opacity: 0.9;
		}

		.block:hover{
								  box-shadow: -8px -8px  grey;
								  opacity: 1;
								  transition: ease-in-out 0.4s;

		}
		.column{
			float: left;
			width: 33.33%;
			padding: 5px;
		}
		.menu:hover{
			background-color: grey;
		}
		.row::after {
  content: "";
  clear: both;
  display: table;
}



</style>	
</head>

	<a href="menu.html" class="menu">Menu</a>
	<div class="aspecial">  Frank Lloyd Wright</div>

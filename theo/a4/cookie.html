<body>
<h2>Cookie Clicker</h2>
<button onclick="updateCPS();">Button</button>
<p id="timeDisplay"></p>
<p id="cpsDisplay"></p>
<br>
<button onclick="reset();">reset</button>

<hr>
<h2>HTML/CSS/JS Quiz</h2>
<p>Click <a href="index.html">here</a> to play the quiz.</p>



<script>

var nClicks = 0;
var startTime = new Date();



function updateCPS() {



	if (nClicks == 0) {
		// first click
		// 1. reset startTime
		// 2. increase nClicks by 1

		var currentTime = new Date();
		var timeElapsed = (currentTime - startTime) / 1000 ;
		startTime = new Date();
		document.getElementById('cpsDisplay').innerHTML = "cps";
		document.getElementById('timeDisplay').innerHTML = "time";

		
		// setInterval(timeElapsed,100);


	}


	else {
		// subsequent clicks:
		// 1. create variable currentTime
		// 2. create variable timeElapsed and subtract start and currentTime
		// 3. calculate CPS = nClicks ÷ timeElapsed 
		//    BUT timeElapsed be measured in seconds (not milliseconds)
		// 4. display CPS using id
		// 5. increase nClicks by 1
	
		var currentTime = new Date();
		var timeElapsed = (currentTime - startTime) / 1000;
		var cps = nClicks / timeElapsed;

		document.getElementById('cpsDisplay').innerHTML = "cps: " + cps;
	



	}
	nClicks = nClicks + 1;
}


setInterval(updateTime, 100)

function updateTime(){
	if (nClicks > 0){
		var currentTime = new Date();
		var timeElapsed = (currentTime - startTime) / 1000; //in seconds
		document.getElementById('timeDisplay').innerHTML = "time:" + timeElapsed;
	}
}

function reset(){
	location.reload();
}


</script>
</body>
</html>

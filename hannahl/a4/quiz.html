<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Assignment 4</title>
	<style> 
		body {
			margin: 50px 100px;
		}
	</style>
</head>
<body>

	<h2>HTML/CSS Quiz</h2>
	<form>
		<label>Type a few sentences about why you love programming</label><br>
		<textarea id="w3review" name="w3review" rows="4" cols="50">Start typing here.</textarea><br>
		<input type="button" value="Submit" onclick="showUserText();">
		<input type="reset"><br>
	</form>

<br>

	<form>
		<label>Select what does HTML stand for:</label><br>
		<input type="radio" value="Hype Text Makeup Lang" name="group">
		<label>Hype Text Makeup Lang</label><br>
		<input id="correctLang" type="radio" value="Hyper Text Markup Language" name="group">
		<label>Hyper Text Makeup Language</label><br>
		<input type="radio" value="Hyper Type Makeup Language" name="group">
		<label>Hyper Type Makeup Language</label><br>
		<input type="button" value="Submit" onclick="checkHTML();">
		<input type="reset">
	</form>
	
<br>
	
	<form> 
		<label>What tag can you use in HTML?</label><br>
		<input id="check1" type="checkbox" value="&lt;document.getElementById&gt;">
		<label>&lt;document.getElementById&gt;</label>
		<input id="check2" type="checkbox" value="&lt;h1&gt;">
		<label>&lt;h1&gt;</label><br>
		<input id="check3" type="checkbox" value="&lt;style&gt;">
		<label>&lt;style&gt;</label>
		<input id="check4" type="checkbox" value="&lt;script&gt;">
		<label>&lt;script&gt;</label><br>
		<input type="button" value="Submit" onclick="checkTag();">
		<input type="reset">
	</form>

<br>
	
<hr>
<h2>Cookie Clicker</h2>
<!--possibly replace quiz.html with index.html-->
<p>Click <a href="index.html">here</a> to play the cookie clicker.</p>

<script>
	//First
	function showUserText() {
		var text = document.getElementById('w3review').value;
		alert("Answer: " + text);
	} // end First

	//Second
	function checkHTML() {
		var correctAns = document.getElementById("correctLang").checked
		alert(correctAns);
	} // end Second

	//Third
	function checkTag() {
		var choice1 = document.getElementById("check1").checked; // p
		var choice2 = document.getElementById("check2").checked; // h1
		var choice3 = document.getElementById("check3").checked; // style
		var choice4 = document.getElementById("check4").checked; // script

		if (choice1 == false && choice2 == true && choice3 == true && choice4 == true) {
			alert("Correct!");
		}
		else {
			alert("Incorrect. Try again.");
		}
	}
</script>
</body>
</html>
